services:
  - type: web
    name: crisis-coach-server
    runtime: node
    rootDir: .
    buildCommand: npm ci
    startCommand: node server/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: EMERGENCY_CONTACT_NUMBER
        sync: false
      - key: ONCALL_THERAPIST_NUMBER
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false

  - type: web
    name: crisis-coach-client
    runtime: static
    rootDir: .
    buildCommand: npm ci && npm --prefix client ci && npm --prefix client run build
    staticPublishPath: client/dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_BODHI_API_KEY
        sync: false
      - key: VITE_BODHI_WS_URL
        sync: false
      - key: VITE_SPATIALREAL_APP_ID
        sync: false
      - key: VITE_SPATIALREAL_AVATAR_ID
        sync: false
      - key: VITE_SPATIALREAL_SESSION_TOKEN
        sync: false
      - key: VITE_HUME_API_KEY
        sync: false
      - key: VITE_API_BASE_URL
        sync: false

  - type: worker
    name: crisis-coach-affect-worker
    runtime: node
    rootDir: .
    buildCommand: npm ci
    startCommand: node server/worker.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: HUME_API_KEY
        sync: false
