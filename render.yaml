services:
  - type: web
    name: clarity-backend
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm ci
    startCommand: npm run server
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: BODHI_API_KEY
        sync: false

  - type: static_site
    name: clarity-frontend
    rootDir: .
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_RENDER_DEPLOYMENT
        value: "true"
      - key: VITE_USE_REAL_BODHI
        value: "true"
      - key: VITE_BODHI_AGENT_ID
        sync: false
      - key: VITE_BODHI_API_KEY
        sync: false
      - key: VITE_BODHI_BASE_URL
        value: https://api.bodhiagent.live
      - key: VITE_API_BASE_URL
        sync: false
